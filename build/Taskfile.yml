version: '3'

vars:
  WAILS_PACKAGE_PATH: ./gui/wails3

tasks:
  go:mod:tidy:
    summary: Runs `go mod tidy`
    internal: true
    # Universal/multi-arch builds invoke this concurrently from parallel deps;
    # two `go mod tidy` processes racing on go.mod can corrupt it (#4637).
    run: once
    dir: gui/wails3
    cmds:
      - go mod tidy

  install:frontend:deps:
    summary: Install frontend dependencies
    run: once
    dir: frontend
    sources:
      - package.json
      - pnpm-lock.yaml
    generates:
      - node_modules
    preconditions:
      - sh: pnpm --version
        msg: "pnpm not found. Install it via: npm install -g pnpm"
    cmds:
      - pnpm install

  build:frontend:
    label: build:frontend (PRODUCTION={{.PRODUCTION}})
    summary: Build the frontend project
    # darwin:build:universal runs its per-arch builds as parallel deps, each of
    # which depends on this task. Without run:once the two executions race:
    # one regenerates frontend/src/bindings (-clean deletes it first) while the
    # other's bundler is reading it, failing intermittently (#4637).
    run: once
    dir: frontend
    sources:
      - "**/*"
      - exclude: node_modules/**/*
    generates:
      - dist/**/*
    deps:
      - task: install:frontend:deps
      - task: generate:bindings
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
    cmds:
      - |
        pnpm run {{.BUILD_COMMAND}}
      - |
        cd ..
        mkdir -p ./internal/web_wails3/dist
        cp -R frontend/dist/* ./internal/web_wails3/dist/

    env:
      PRODUCTION: '{{.PRODUCTION | default "false"}}'
    vars:
      # Our frontend build scripts (see frontend/package.json). The wails lite
      # variants embed a token-free login shell suited to the desktop window.
      BUILD_COMMAND: '{{if eq .PRODUCTION "true"}}build:wails:lite{{else}}build:dev:wails:lite{{end}}'


  generate:bindings:
    label: generate:bindings (BUILD_FLAGS={{.BUILD_FLAGS}})
    summary: Generates bindings for the frontend
    run: once
    deps:
      - task: go:mod:tidy
    sources:
      - "**/*.[jt]s"
      - exclude: frontend/**/*
      - frontend/src/bindings/**/*  # Rerun when switching between dev/production mode causes changes in output
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - frontend/src/bindings/**/*
    cmds:
      - |
        cd {{.WAILS_PACKAGE_PATH}}
        pwd
        wails3 generate bindings -ts -f '{{.BUILD_FLAGS}}' -clean=true ./ -d ../../frontend/src/bindings

  generate:icons:
    summary: Generates Windows `.ico` and Mac `.icns` files from an image
    run: once
    dir: build
    sources:
      - "appicon.png"
    generates:
      - "darwin/icons.icns"
      - "windows/icon.ico"
    cmds:
      - wails3 generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico

  dev:frontend:
    summary: Runs the frontend in development mode
    deps:
      - task: install:frontend:deps
    cmds:
      - task: frontend:dev:pnpm

  frontend:dev:pnpm:
    dir: frontend
    cmds:
      # Invoke vite directly instead of `pnpm run dev -- ...`: the dev script
      # already hardcodes --port, and duplicated flags confuse vite's CLI.
      # Bind to 127.0.0.1 explicitly — the wails3 asset proxy dials the dev
      # server with tcp4 only, so a vite bound to ::1 (what `localhost` can
      # resolve to) yields 502 Bad Gateway on every request in the GUI window.
      - pnpm exec vite --mode development --host 127.0.0.1 --port {{.VITE_PORT}} --strictPort

  update:build-assets:
    summary: Updates the build assets
    dir: build
    cmds:
      - wails3 update build-assets -name "{{.BIN_NAME}}" -binaryname "{{.BIN_NAME}}" -config config.yml -dir .
