# https://taskfile.dev

version: '3'

vars:
  GREETING: Hello, World!
  VERSION: ""
  BUILD_DIR: build
  DIST_DIR: build/dist
  
  APP_NAME: "model-box"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'
  TINGLY_BOX_KEY: tingly-box-?
  TINGLY_BOX_ENTERPRISE_KEY:

tasks:
  default:
    cmds:
      - echo "{{.GREETING}}"
    silent: true
  
  codex-image-gen:
    cmds:
      - |
        curl -s -X POST "http://localhost:12580/tingly/imagegen/v1/images/generations" \
          -H "Authorization: Bearer {{.TINGLY_BOX_KEY}}" \
          -H "Content-Type: application/json" \
          -d '{
            "model": "gpt-image-2",
            "prompt": "A cute orange cat and dog sitting on a wooden desk, soft natural light",
            "size": "1024x1024",
            "quality": "low"
          }' \
        | jq -r '.data[0].b64_json' \
        | base64 -d > output.png
  
  codex-image-responses:
    cmds:
      - |
        curl -v http://localhost:12580/tingly/imagegen/responses \
        -H "Authorization: Bearer {{.TINGLY_BOX_KEY}}" \
        -H "Content-Type: application/json" \
        -d '{
          "model": "gpt-5.5",
          "stream": true,
          "input": [
            {
              "role": "user",
              "content": "Draw a clean product icon for an AI gateway app."
            }
          ],
          "tools": [
            {
              "type": "image_generation",
              "size": "1024x1024",
              "output_format": "png"
            }
          ]
        }'
        
  codex-responses-nonstream:
    cmds:
      - |
        curl -X POST -k http://localhost:12580/tingly/codex/v1/responses \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer {{.TINGLY_BOX_KEY}}" \
        -d '{
          "model": "gpt-5.5",
          "input": [{"role": "user", "content": "what can you do?"}],
          "store": true
        }'
  
  request-o2a:
    cmds:
      - |
        curl -X POST http://localhost:12580/tingly/openai/chat/completions \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer {{.TINGLY_BOX_KEY}}" \
        -d '{
        		"messages": [{
        			"role": "user",
        			"content": "请帮我计算 3+5，并告诉我北京天气"
        		}],
        		"model": "tingly-anthropic",
        		"stream": false,
        		 "tools": [
                  {
                    "type": "function",
                    "function": {
                      "name": "add_numbers",
                      "description": "Add two numbers",
                      "parameters": {
                        "type": "object",
                        "properties": {
                          "a": { "type": "number" },
                          "b": { "type": "number" }
                        },
                        "required": ["a", "b"]
                      }
                    }
                  }
                ]
        	}'
  
  
  
