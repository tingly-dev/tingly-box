# https://taskfile.dev

version: '3'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml

vars:
  VERSION: ""
  BUILD_DIR: build
  DIST_DIR: build/dist
  
  PACKAGE_PATH: ./internal/wails3
  
  APP_NAME: "TinglyBox"
  BIN_NAME: "tingly-box"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'

tasks:
  wails:build:
    summary: Builds the application
    cmds:
      - task: codegen
      - task: "{{OS}}:build"
  
  wails:package:
    summary: Packages a production build of the application
    cmds:
      - task: codegen
      - task: "{{OS}}:package"
  
  wails:run:
    summary: Runs the application
    cmds:
      - task: codegen
      - task: "{{OS}}:run"
  
  wails:dev:
    summary: Runs the application in development mode
    cmds:
      - task: codegen
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}
  
  wails:binding:
    cmds:
      - wails3 generate bindings -ts -f '-buildvcs=false -gcflags=all="-l"' -clean=true ./wails3 -d frontend/src/bindings
  
  wails:manual:
    cmds:
      - cd frontend; pnpm build:wails
      - |
        mkdir -p internal/gui/dist/
        cp -R frontend/dist/* internal/gui/dist/
      - |
        go build -tags debug -trimpath -buildvcs=false -ldflags="-w -s" -o bin/{{.BIN_NAME}} {{.PACKAGE_PATH}}
        mkdir -p bin/{{.APP_NAME}}.app/Contents/{MacOS,Resources}
        cp build/darwin/icons.icns bin/{{.APP_NAME}}.app/Contents/Resources
        cp bin/{{.BIN_NAME}} bin/{{.APP_NAME}}.app/Contents/MacOS
        cp build/darwin/Info.plist bin/{{.APP_NAME}}.app/Contents
        codesign --force --deep --sign - bin/{{.APP_NAME}}.app
  
  codegen:
    cmds:
      - |
        echo install openapi-generator
        echo darwin: brew install openapi-generator
        echo others: npm install @openapitools/openapi-generator-cli -g
        echo ref: https://openapi-generator.tech/docs/installation
      - |
        openapi-generator-cli generate -g typescript-axios -i ./swagger.json -o ./frontend/src/client
  
  swagger:
    cmds:
      - |
        curl -s http://localhost:8080/swagger.json > swagger.json
  
  start:
    cmds:
      - task: go:build
      - ./build/tingly start
  
  cli:build:
    cmds:
      - task: web:dist
      - task: go:build
  
  go:build:
    cmds:
      - |
        mkdir -p build
        go build -o ./build/{{.BIN_NAME}} ./cmd/tingly-box
  
  go:test:
    cmds:
      - |
        go test ./internal/...
  
  cli:dev:
    cmds:
      - task: web:dist
      - |
        go run ./cmd/tingly-box start
  
  web:dev:
    cmds:
      - |
        cd frontend; pnpm dev
  
  web:dist:
    cmds:
      - |
        cd frontend; pnpm build
      - |
        mkdir -p internal/web/dist/
        cp -R frontend/dist/* internal/web/dist/
  
  web:dist-dev:
    cmds:
      - |
        cd frontend; pnpm build:dev
      - |
        mkdir -p internal/web/dist/
        cp -R frontend/dist/* internal/web/dist/
  
  gui:build:
    cmds:
      - |
        go build -buildvcs=false -gcflags=all="-l" -o bin/{{.BIN_NAME}} ./wails3
  
  dist:
    desc: Build cross-platform distributions for Windows, Linux, and macOS
    cmds:
      - task: web:dist
      - |
        echo "Building distributions for version {{.VERSION}}..."
        
        # Create distribution directory
        mkdir -p {{.DIST_DIR}}
        
        # Build for Windows (amd64)
        echo "Building for Windows (amd64)..."
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X main.version={{.VERSION}}" -o {{.DIST_DIR}}/{{.BIN_NAME}}-{{.VERSION}}-windows-amd64.exe ./cmd/tingly
        
        # Build for Linux (amd64)
        echo "Building for Linux (amd64)..."
        GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version={{.VERSION}}" -o {{.DIST_DIR}}/{{.BIN_NAME}}-{{.VERSION}}-linux-amd64 ./cmd/tingly
        
        # Build for macOS (amd64)
        echo "Building for macOS (amd64)..."
        GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.version={{.VERSION}}" -o {{.DIST_DIR}}/{{.BIN_NAME}}-{{.VERSION}}-darwin-amd64 ./cmd/tingly
        
        # Build for macOS (arm64)
        echo "Building for macOS (arm64)..."
        GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.version={{.VERSION}}" -o {{.DIST_DIR}}/{{.BIN_NAME}}-{{.VERSION}}-darwin-arm64 ./cmd/tingly
        
        # Create archives
        echo "Creating archives..."
        cd {{.DIST_DIR}}
        ls
        
        # # Windows archive (zip)
        # zip -q tingly-{{.VERSION}}-windows-amd64.zip tingly-{{.VERSION}}-windows-amd64.exe
        
        # # Linux archive (tar.gz)
        # tar -czf tingly-{{.VERSION}}-linux-amd64.tar.gz tingly-{{.VERSION}}-linux-amd64
        
        # # macOS archives (tar.gz)
        # tar -czf tingly-{{.VERSION}}-darwin-amd64.tar.gz tingly-{{.VERSION}}-darwin-amd64
        # tar -czf tingly-{{.VERSION}}-darwin-arm64.tar.gz tingly-{{.VERSION}}-darwin-arm64
        
        # # Create universal macOS binary
        # echo "Creating universal macOS binary..."
        # lipo -create -output tingly-{{.VERSION}}-darwin-universal tingly-{{.VERSION}}-darwin-amd64 tingly-{{.VERSION}}-darwin-arm64
        # tar -czf tingly-{{.VERSION}}-darwin-universal.tar.gz tingly-{{.VERSION}}-darwin-universal
        
        # # Clean up binaries after creating archives
        # rm -f tingly-{{.VERSION}}-windows-amd64.exe tingly-{{.VERSION}}-linux-amd64 tingly-{{.VERSION}}-darwin-amd64 tingly-{{.VERSION}}-darwin-arm64 tingly-{{.VERSION}}-darwin-universal
        
        # cd ../..
        
        # # List created files
        # echo "Build completed! Created files:"
        # ls -la {{.DIST_DIR}}/
        
        # echo ""
        # echo "Distribution files created in {{.DIST_DIR}}/:"
        # echo "- tingly-{{.VERSION}}-windows-amd64.zip"
        # echo "- tingly-{{.VERSION}}-linux-amd64.tar.gz"
        # echo "- tingly-{{.VERSION}}-darwin-amd64.tar.gz"
        # echo "- tingly-{{.VERSION}}-darwin-arm64.tar.gz"
        # echo "- tingly-{{.VERSION}}-darwin-universal.tar.gz"
  
  release:
    desc: Create and push git tag with version passed as parameter. run as 'VERSION=v0.0.9 task release'
    cmds:
      - |
        # Get version from parameter
        VERSION="${VERSION:-}"
        
        # Check if version is provided
        if [ -z "$VERSION" ]; then
          echo "Error: VERSION parameter is required!"
          echo "Usage: VERSION=v0.0.9 task release"
          exit 1
        fi
        
        # Validate version format
        if [[ ! $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Error: Invalid version format: $VERSION"
          echo "Expected format: v1.2.3"
          exit 1
        fi
        
        # Check if tag already exists
        if git tag | grep -q "^${VERSION}$"; then
          echo "Error: Tag $VERSION already exists!"
          echo "Choose a new version and try again"
          exit 1
        fi
        
        # Create and push tag
        echo "Creating tag $VERSION..."
        git tag "$VERSION"
        
        echo "Pushing tag to origin..."
        git push origin "$VERSION"
        
        echo "âœ… Distribution started! CI will now build and release."