# https://taskfile.dev
#
# Wails3 desktop GUI build orchestration. Resynced to the upstream wails3
# alpha2 template layout: the common build steps live in build/Taskfile.yml
# and per-OS steps in build/{darwin,windows,linux}/Taskfile.yml. Build/package
#/run dispatch to the target OS via {{.GOOS}} (defaults to host OS, overridable
# for cross-compilation, e.g. `GOOS=windows task wails:build`).

version: '3'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml

vars:
  APP_NAME: "TinglyBox"
  BIN_NAME: "tingly-box"
  # Wails GUI package — the per-OS Taskfiles build this, not the repo root.
  WAILS_PACKAGE_PATH: ./gui/wails3
  PACKAGE_PATH: ./gui/wails3
  BIN_DIR: "bin"
  # pnpm (we ship frontend/pnpm-lock.yaml).
  PACKAGE_MANAGER: '{{.PACKAGE_MANAGER | default "pnpm"}}'
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'
  # Target OS for build/package/run. Defaults to the host OS, overridden by
  # `GOOS=windows task wails:build` (or the GOOS env var) for cross-compilation.
  GOOS: '{{.GOOS | default OS}}'

tasks:
  wails:build:
    summary: Builds the application
    cmds:
      - task: codegen
      - task: "{{.GOOS}}:build"

  wails:package:
    summary: Packages a production build of the application
    cmds:
      - task: codegen
      - task: "{{.GOOS}}:package"

  wails:run:
    summary: Runs the application
    cmds:
      - task: codegen
      - task: "{{.GOOS}}:run"

  wails:dev:
    summary: Runs the application in development mode
    cmds:
      - task: codegen
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  wails:binding:
    cmds:
      - |
        cd ./gui/wails3
        wails3 generate bindings -ts -f '-buildvcs=false -gcflags=all="-l"' -clean=true ./ -d ../../frontend/src/bindings

  wails:web:
    cmds:
      - cd frontend; pnpm build:dev:wails
      - |
        mkdir -p internal/web_wails3/dist/
        cp -R frontend/dist/* internal/web_wails3/dist/

  wails:manual:
    cmds:
      - |
        # Get build info
        VERSION="dev"
        GIT_COMMIT="$(git rev-parse HEAD 2>/dev/null || echo 'unknown')"
        GO_VERSION="$(go version | awk '{print $3}' | sed 's/go//' 2>/dev/null || echo 'unknown')"
        PLATFORM="$(go env GOOS)/$(go env GOARCH)"

        # Build with ldflags
        LDFLAGS='-X main.version=${VERSION} -X main.gitCommit=${GIT_COMMIT} -X main.buildTime=${BUILD_TIME} -X main.goVersion=${GO_VERSION} -X main.platform=${PLATFORM} -w -s'
        go build -tags debug -trimpath -buildvcs=false -ldflags="${LDFLAGS}" -o bin/{{.BIN_NAME}} {{.PACKAGE_PATH}}
        mkdir -p bin/{{.APP_NAME}}.app/Contents/{MacOS,Resources}
        cp build/darwin/icons.icns bin/{{.APP_NAME}}.app/Contents/Resources
        cp bin/{{.BIN_NAME}} bin/{{.APP_NAME}}.app/Contents/MacOS
        cp build/darwin/Info.plist bin/{{.APP_NAME}}.app/Contents
        codesign --force --deep --sign - bin/{{.APP_NAME}}.app
