services:
  # Tingly Box Server
  tingly-box:
    build:
      context: .
      dockerfile: docker.npx.Dockerfile
    container_name: tingly-box
    ports:
      - "12581:12580"
    volumes:
      # Mount configuration directory
      - ./data/.tingly-box:/app/.tingly-box
      # Mount logs directory
      - ./data/logs:/app/logs
      # Mount memory directory
      - ./data/memory:/app/memory
    environment:
      - TINGLY_PORT=12580
      - TINGLY_HOST=0.0.0.0
      - TINGLY_DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tingly-box", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development mode - mount source and rebuild manually
  tingly-box-dev:
    build:
      context: .
      dockerfile: docker.npx.Dockerfile
    container_name: tingly-box-dev
    ports:
      - "12581:12580"
    volumes:
      # Mount configuration directory
      - ./data/.tingly-box:/app/.tingly-box
      # Mount logs directory
      - ./data/logs:/app/logs
      # Mount memory directory
      - ./data/memory:/app/memory
    environment:
      - TINGLY_PORT=12580
      - TINGLY_HOST=0.0.0.0
      - TINGLY_DEBUG=true
    profiles:
      - dev
