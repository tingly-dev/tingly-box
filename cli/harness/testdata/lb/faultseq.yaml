# faultseq — the same failover behaviour as `cascade`, but written with the
# structured `faults` form to show the schema extension: `repeat` compacts
# consecutive identical statuses and `on_exhaust` picks loop|clamp|fail
# (clamp = last step repeats, the historical default). The primary's program
# below is exactly equivalent to the shorthand `[500, 500, 500, 200]`.
#
# Fault programs are backed by the same vmodel.Sequence engine that powers the
# production /virtual/v1/* SequenceModel; only each step's HTTP status affects
# LB/failover decisions here.
rule_uuid: faultseq
tactic: tier
affinity_secs: 1800
services:
  - { provider: openai, model: gpt-5.4, tier: 0 }
  - { provider: openai, model: gpt-5.5, tier: 1 }
faults:
  openai/gpt-5.4:
    steps:
      - { status: 500, repeat: 3 }   # fail three times…
      - { status: 200 }              # …then recover
    on_exhaust: clamp                # last step (200) repeats thereafter
  openai/gpt-5.5: [200]              # shorthand still works alongside
expect:
  final_status: 200
  attempts: [openai/gpt-5.4]
  pin: openai/gpt-5.4
  breaker:
    openai/gpt-5.4: half_open
    openai/gpt-5.5: closed
program:
  - { request: session1 }
  - { request: session1 }
  - { request: session1 }     # gpt-5.4 breaker opens here
  - { request: session1 }     # pin moves to gpt-5.5
  - { advance: 31s }          # past the breaker's 30s open window
  - { request: session1 }     # half-open probe → gpt-5.4 success 1/3 → pin snaps back
  - { request: session1 }     # second probe succeeds; breaker remains half-open
