name: Harness SDK Nightly

run-name: >-
  🌙 Harness real-SDK ${{ github.event_name == 'workflow_dispatch'
    && format('(client={0})', github.event.inputs.client)
    || '(nightly)' }}

# Drives the protocol matrix through the REAL Python and Node SDKs
# (anthropic / openai packages) as subprocess drivers, so the gateway is
# validated against genuinely foreign client stacks — pydantic strict
# validation, the JS SDK's SSE consumer — not just Go code.
#
# Runs nightly (and on demand) rather than per-PR: it needs Python/Node
# toolchains and intentionally tracks current SDK releases, so upstream
# strictness changes surface here first. See .design/harness-matrix.md
# ("Client drivers") for the driver contract.
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      client:
        description: 'Which real-SDK client to run'
        required: false
        type: choice
        default: all
        options:
          - all
          - python
          - node
          - aisdk

permissions:
  contents: read

env:
  GO_VERSION: '1.26'

concurrency:
  group: harness-sdk-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: matrix-python-sdk
    if: github.event_name == 'schedule' || github.event.inputs.client == 'all' || github.event.inputs.client == 'python'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tests/clients/python/requirements.txt

      - name: Install Python SDKs
        run: pip install -r tests/clients/python/requirements.txt

      - name: Run harness — python driver
        run: |
          set -o pipefail
          go run ./cli/harness matrix --mode=single --client=python --json | tee harness-matrix-python.log

      - name: Upload matrix JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-python-sdk-json
          path: harness-matrix-python.log
          if-no-files-found: ignore

  node:
    name: matrix-node-sdk
    if: github.event_name == 'schedule' || github.event.inputs.client == 'all' || github.event.inputs.client == 'node'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node SDKs
        run: npm install --prefix tests/clients/node

      - name: Run harness — node driver
        run: |
          set -o pipefail
          go run ./cli/harness matrix --mode=single --client=node --json | tee harness-matrix-node.log

      - name: Upload matrix JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-node-sdk-json
          path: harness-matrix-node.log
          if-no-files-found: ignore

  aisdk:
    name: matrix-vercel-ai-sdk
    if: github.event_name == 'schedule' || github.event.inputs.client == 'all' || github.event.inputs.client == 'aisdk'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install AI SDK (Vercel)
        run: npm install --prefix tests/clients/aisdk

      - name: Run harness — AI SDK driver
        run: |
          set -o pipefail
          go run ./cli/harness matrix --mode=single --client=aisdk --json | tee harness-matrix-aisdk.log

      - name: Upload matrix JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-vercel-ai-sdk-json
          path: harness-matrix-aisdk.log
          if-no-files-found: ignore
