name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of Tingly-Box are you using?
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS & Architecture
      description: Which operating system and CPU architecture are you running Tingly-Box on?
      options:
        - macOS Apple Silicon (M-chip)
        - macOS Intel
        - Windows x86_64
        - Windows ARM64
        - Linux x86_64
        - Linux ARM64
        - Other
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which area does this feature relate to?
      options:
        - Protocol
        - UI
        - Remote Control
        - Other
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: Describe the use case or scenario that motivates this feature request
      placeholder: |
        When I do X, I'd like to be able to Y because...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: If you have an idea for how this could be implemented, describe it here
    validations:
      required: false
