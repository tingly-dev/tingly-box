name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of Tingly-Box are you using?
      placeholder: "e.g. v0.260604.2"
    validations:
      required: true

  - type: dropdown
    id: system
    attributes:
      label: System Information
      description: OS and architecture
      options:
        - Windows amd64
        - Windows arm64
        - macOS amd64
        - macOS arm64 (Apple Silicon)
        - Linux amd64 (x86_64)
        - Linux arm64
        - Other
    validations:
      required: true

  - type: input
    id: system_other
    attributes:
      label: System Details (Other)
      description: Please specify your system if you selected "Other"
      placeholder: "e.g. FreeBSD 13 x86_64"
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which area does this feature relate to?
      options:
        - Protocol
        - UI
        - Remote Control
        - Agent
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: Describe the use case or scenario that motivates this feature request
      placeholder: |
        When I do X, I'd like to be able to Y because...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: If you have an idea for how this could be implemented, describe it here
    validations:
      required: false
