name: Bug Report
description: Report a bug in Tingly-Box
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of Tingly-Box are you using?
      placeholder: "e.g. v0.260604.2"
    validations:
      required: true

  - type: dropdown
    id: system
    attributes:
      label: System Information
      description: OS and architecture
      options:
        - Windows amd64
        - Windows arm64
        - macOS amd64
        - macOS arm64 (Apple Silicon)
        - Linux amd64 (x86_64)
        - Linux arm64
        - Other
    validations:
      required: true

  - type: input
    id: system_other
    attributes:
      label: System Details (Other)
      description: Please specify your system if you selected "Other"
      placeholder: "e.g. FreeBSD 13 x86_64"
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which area does this bug affect?
      options:
        - Protocol
        - UI
        - Remote Control
        - Agent
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: Describe the scenario in which the bug occurs — what you were doing and what you expected to happen
      placeholder: |
        I was doing X with model Y when...
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs or error messages
      render: shell
    validations:
      required: false
