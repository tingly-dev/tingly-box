name: 'Build and Push Docker Image'
description: 'Builds and pushes Docker image to GHCR'
inputs:
  registry:
    description: 'Container registry'
    required: false
    default: 'ghcr.io'
  image_name:
    description: 'Name of the image'
    required: true
  version:
    description: 'Version tag for the image'
    required: true
  dockerfile:
    description: 'Path to Dockerfile'
    required: false
    default: './npx.Dockerfile'
  build_args:
    description: 'Additional build arguments (key=value pairs, one per line)'
    required: false
    default: ''
  platforms:
    description: 'Target platforms'
    required: false
    default: 'linux/amd64'
outputs:
  image_digest:
    description: 'Digest of the pushed image'
    value: ${{ steps.build.outputs.digest }}
  tags:
    description: 'Tags applied to the image'
    value: ${{ steps.meta.outputs.tags }}
runs:
  using: 'composite'
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.registry }}/tingly-dev/${{ inputs.image_name }}
        tags: |
          type=raw,value=${{ inputs.version }}
          type=raw,value=latest

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: ${{ inputs.platforms }}
        build-args: ${{ inputs.build_args }}

    - name: Generate image digest summary
      shell: bash
      run: |
        cat >> $GITHUB_STEP_SUMMARY << 'EOF'
        ## Docker Image Published :rocket:

        **Tag:** `${{ inputs.version }}`
        **Image:** `${{ inputs.registry }}/tingly-dev/${{ inputs.image_name }}:${{ inputs.version }}`

        ### Pull Command
        ```bash
        docker pull ${{ inputs.registry }}/tingly-dev/${{ inputs.image_name }}:${{ inputs.version }}
        ```

        ### Run Command
        ```bash
        mkdir tingly-data
        docker run -d \
          --name tingly-box \
          -p 12580:12580 \
          -v `pwd`/tingly-data:/app/.tingly-box \
          ${{ inputs.registry }}/tingly-dev/${{ inputs.image_name }}:${{ inputs.version }}
        ```
        EOF
